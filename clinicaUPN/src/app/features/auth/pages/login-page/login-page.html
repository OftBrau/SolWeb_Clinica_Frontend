<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow p-4" style="width: 380px">

    <h4 class="text-center mb-4 fw-bold text-primary">Clínica UPN</h4>

    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input
        type="email"
        class="form-control"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        placeholder="usuario@upn.edu.pe"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input
        type="password"
        class="form-control"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        placeholder="Ingresa tu contraseña"
      />
    </div>

    @if (error()) {
      <div class="alert alert-danger py-2 small text-center">{{ error() }}</div>
    }

    <button
      class="btn btn-primary w-100 mt-2"
      (click)="onLogin()"
      [disabled]="loading()"
    >
      {{ loading() ? 'Ingresando...' : 'Iniciar sesión' }}
    </button>

    <div class="text-center mt-3">
      <a routerLink="/" class="text-decoration-none small text-muted">
        <i class="bi bi-arrow-left"></i> Volver al inicio
      </a>
    </div>

  </div>
</div>
